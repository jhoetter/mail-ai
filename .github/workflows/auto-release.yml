name: Auto Release

# Mirrors office-ai's auto-release flow:
#
#   1. CI gate (`pnpm verify`) on every push to main.
#   2. If green and the commit isn't already tagged, compute the next
#      patch version, bump every publishable package via
#      scripts/bump-version.mjs, commit, tag, push.
#   3. Build two release tarballs:
#        - mailai-agent-X.Y.Z.tgz — the @mailai/agent CLI consumed
#                                  by hof-os' subapps sandbox image.
#        - mailai-ui-X.Y.Z.tgz    — the @mailai/hofos-ui dist consumed
#                                  by hof-os' data-app UI.
#   3b. Build + push the server image to GHCR
#       (`ghcr.io/<owner>/mail-ai-server:<version>`). hof-os' Compose
#       generator references this image to spin up the mailai sidecar
#       (see infra/docker/Dockerfile.server + the lockfile `app_image`
#       field below).
#   4. Publish a GitHub Release vX.Y.Z with the tarballs attached.
#   5. notify-hof-os: fire a `repository_dispatch` event of type
#      `mailai-released` against `jhoetter/hof-os` with a small
#      `client_payload` (version, tag, source SHA, image ref). The
#      hof-os listener (`.github/workflows/sister-product-lock.yml`)
#      then regenerates `infra/mailai.lock.json` deterministically from
#      that payload, bumps the docker-compose image-tag default, and
#      opens a PR — review-gated, no direct writes from this workflow
#      to hof-os' `main` branch.
#
#      Requires the `HOFOS_DISPATCH_TOKEN` secret: a fine-grained PAT
#      scoped to repository dispatch on `jhoetter/hof-os`. If the
#      secret is missing, the notification step skips cleanly after the
#      release artifacts and GHCR image have already been published.
#
# To bypass a release for a doc-only commit, append `[skip ci]` or
# `[skip release]` to the commit message.

on:
  push:
    branches: [main]
    paths-ignore:
      - "*.md"
      - "docs/**"

jobs:
  check:
    name: Verify (quality gate)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.15.4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run quality gate
        run: pnpm verify

  release:
    name: Bump, Tag & Release
    needs: check
    runs-on: ubuntu-latest
    timeout-minutes: 20
    if: "!contains(github.event.head_commit.message, '[skip ci]') && !contains(github.event.head_commit.message, '[skip release]')"
    permissions:
      contents: write
      packages: write
    outputs:
      new_version: ${{ steps.bump.outputs.new_version }}
      new_tag: ${{ steps.bump.outputs.new_tag }}
      image_ref: ${{ steps.image_ref.outputs.image_ref }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.15.4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Check if current commit already tagged
        id: check_tag
        run: |
          if git tag --points-at HEAD | grep -q '^v'; then
            echo "already_tagged=true" >> "$GITHUB_OUTPUT"
          else
            echo "already_tagged=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Sync main, bump version, commit, push
        if: steps.check_tag.outputs.already_tagged == 'false'
        id: bump
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          release_commit_push() {
            git fetch origin main --tags
            git merge origin/main --no-edit
            LATEST_TAG="$(git tag --list 'v*' --sort=-v:refname | head -n 1)"
            CURRENT_VERSION="$(node -p "require('./package.json').version")"
            if [ -z "$LATEST_TAG" ]; then
              # First release: ship workspace's current version (avoids
              # surprising bumps on the very first run).
              if [ "$CURRENT_VERSION" = "0.0.0" ]; then
                NEW_VERSION="0.1.0"
              else
                NEW_VERSION="${CURRENT_VERSION}"
              fi
            else
              VERSION="${LATEST_TAG#v}"
              IFS='.' read -r MAJOR MINOR PATCH <<< "$VERSION"
              NEW_PATCH=$((PATCH + 1))
              NEW_VERSION="${MAJOR}.${MINOR}.${NEW_PATCH}"
            fi
            echo "Releasing ${NEW_VERSION} (current workspace=${CURRENT_VERSION}, latest tag=${LATEST_TAG:-<none>})"
            node scripts/bump-version.mjs "${NEW_VERSION}"
            git add package.json packages/*/package.json
            if git diff --cached --quiet; then
              echo "No version bump needed (workspace already at ${NEW_VERSION})"
            else
              git commit -m "chore: bump to ${NEW_VERSION} [skip ci]"
              git push origin HEAD:main
            fi
            echo "new_version=${NEW_VERSION}" >> "$GITHUB_OUTPUT"
            echo "new_tag=v${NEW_VERSION}" >> "$GITHUB_OUTPUT"
          }

          if ! release_commit_push; then
            git fetch origin main --tags
            git reset --hard origin/main
            release_commit_push || exit 1
          fi

      - name: Tag and push
        if: steps.check_tag.outputs.already_tagged == 'false'
        run: |
          git tag "${{ steps.bump.outputs.new_tag }}"
          git push origin "${{ steps.bump.outputs.new_tag }}"

      - name: Refresh lockfile after bump
        if: steps.check_tag.outputs.already_tagged == 'false'
        run: pnpm install --no-frozen-lockfile

      - name: Build workspace
        if: steps.check_tag.outputs.already_tagged == 'false'
        run: pnpm build

      - name: Build release bundle (mailai-agent)
        if: steps.check_tag.outputs.already_tagged == 'false'
        run: |
          set -euo pipefail
          VERSION="${{ steps.bump.outputs.new_version }}"
          DEPLOY_DIR="${RUNNER_TEMP}/mailai-agent"
          rm -rf "${DEPLOY_DIR}"
          pnpm --filter @mailai/agent --prod deploy "${DEPLOY_DIR}"
          test -f "${DEPLOY_DIR}/dist/cli.js" || (echo "missing dist/cli.js" && exit 1)
          tar czf "mailai-agent-${VERSION}.tgz" -C "${RUNNER_TEMP}" mailai-agent
          ls -lh "mailai-agent-${VERSION}.tgz"

      - name: Build release bundle (mailai-ui)
        if: steps.check_tag.outputs.already_tagged == 'false'
        run: |
          set -euo pipefail
          VERSION="${{ steps.bump.outputs.new_version }}"
          pnpm --filter @mailai/hofos-ui build:dist
          test -f "packages/hofos-ui/dist/index.js" || (echo "missing packages/hofos-ui/dist/index.js" && exit 1)
          pnpm --dir packages/hofos-ui pack --pack-destination .
          mv packages/hofos-ui/mailai-hofos-ui-*.tgz "mailai-ui-${VERSION}.tgz"
          ls -lh "mailai-ui-${VERSION}.tgz"

      - name: Compute server image ref
        if: steps.check_tag.outputs.already_tagged == 'false'
        id: image_ref
        env:
          NEW_VERSION: ${{ steps.bump.outputs.new_version }}
        run: |
          OWNER_LC="$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')"
          echo "image_ref=ghcr.io/${OWNER_LC}/mail-ai-server:${NEW_VERSION}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        if: steps.check_tag.outputs.already_tagged == 'false'
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        if: steps.check_tag.outputs.already_tagged == 'false'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push @mailai/server image
        if: steps.check_tag.outputs.already_tagged == 'false'
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./infra/docker/Dockerfile.server
          push: true
          tags: ${{ steps.image_ref.outputs.image_ref }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Publish GitHub Release
        if: steps.check_tag.outputs.already_tagged == 'false'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          VERSION="${{ steps.bump.outputs.new_version }}"
          gh release create "v${VERSION}" \
            "mailai-agent-${VERSION}.tgz" \
            "mailai-ui-${VERSION}.tgz" \
            --title "v${VERSION}" \
            --generate-notes

  notify-hof-os:
    name: Notify hof-os of new release
    needs: release
    runs-on: ubuntu-latest
    timeout-minutes: 5
    # Triggers on every successful release. This fires a single
    # repository_dispatch event and lets hof-os' own
    # sister-product-lock workflow open a PR.
    if: needs.release.outputs.new_version != ''
    steps:
      - name: Dispatch lockfile bump to hof-os
        env:
          GH_TOKEN: ${{ secrets.HOFOS_DISPATCH_TOKEN }}
          NEW_VERSION: ${{ needs.release.outputs.new_version }}
          NEW_TAG: ${{ needs.release.outputs.new_tag }}
          IMAGE_REF: ${{ needs.release.outputs.image_ref }}
          GIT_SHA: ${{ github.sha }}
        run: |
          set -euo pipefail
          if [ -z "${GH_TOKEN}" ]; then
            echo "HOFOS_DISPATCH_TOKEN is not set; skipping hof-os dispatch."
            exit 0
          fi
          payload="$(jq -nc \
            --arg version "${NEW_VERSION}" \
            --arg tag "${NEW_TAG}" \
            --arg source_sha "${GIT_SHA}" \
            --arg image_ref "${IMAGE_REF}" \
            '{version: $version, tag: $tag, source_sha: $source_sha, image_ref: $image_ref}')"
          request="$(jq -nc \
            --arg event_type mailai-released \
            --argjson client_payload "${payload}" \
            '{event_type: $event_type, client_payload: $client_payload}')"
          # Three attempts with exponential backoff (3s, 9s, 27s).
          # GitHub's dispatch API is normally instant but flaky bursts
          # do happen during outages, and an unfired dispatch silently
          # leaves hof-os pinned to the previous version.
          for attempt in 1 2 3; do
            if gh api repos/jhoetter/hof-os/dispatches \
              --method POST \
              --input - <<< "${request}"; then
              echo "Dispatched mailai-released v${NEW_VERSION} (attempt ${attempt})"
              exit 0
            fi
            sleep $((3 ** attempt))
          done
          echo "Failed to dispatch after 3 attempts" >&2
          exit 1
