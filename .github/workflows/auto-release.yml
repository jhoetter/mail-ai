name: Auto Release

# Mirrors office-ai's auto-release flow:
#
#   1. CI gate (`pnpm verify`) on every push to main.
#   2. If green and the commit isn't already tagged, compute the next
#      patch version, bump every publishable package via
#      scripts/bump-version.mjs, commit, tag, push.
#   3. Build two self-contained tarballs via `pnpm deploy`:
#        - mailai-agent-X.Y.Z.tgz   — the @mailai/agent CLI consumed
#                                     by hof-os' subapps sandbox image.
#        - mailai-react-app-X.Y.Z.tgz — the @mailai/react-app embed
#                                       consumed by hof-os' data-app UI.
#   3b. Build + push the server image to GHCR
#       (`ghcr.io/<owner>/mail-ai-server:<version>`). hof-os' Compose
#       generator references this image to spin up the mailai sidecar
#       (see infra/docker/Dockerfile.server + the lockfile `app_image`
#       field below).
#   4. Publish a GitHub Release vX.Y.Z with the tarballs attached.
#   5. notify-hof-os: rewrite jhoetter/hof-os' infra/mailai.lock.json
#      to point at the new release. Requires the MAILAI_SYNC_TOKEN
#      secret (a fine-grained PAT with `contents: write` on hof-os).
#      The job is `if`-guarded so it skips silently if the secret
#      isn't configured (e.g. on forks).
#
# To bypass a release for a doc-only commit, append `[skip ci]` or
# `[skip release]` to the commit message.

on:
  push:
    branches: [main]
    paths-ignore:
      - "*.md"
      - "docs/**"

jobs:
  check:
    name: Verify (quality gate)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.15.4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run quality gate
        run: pnpm verify

  release:
    name: Bump, Tag & Release
    needs: check
    runs-on: ubuntu-latest
    timeout-minutes: 20
    if: "!contains(github.event.head_commit.message, '[skip ci]') && !contains(github.event.head_commit.message, '[skip release]')"
    permissions:
      contents: write
      packages: write
    outputs:
      new_version: ${{ steps.bump.outputs.new_version }}
      new_tag: ${{ steps.bump.outputs.new_tag }}
      image_ref: ${{ steps.image_ref.outputs.image_ref }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.15.4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Check if current commit already tagged
        id: check_tag
        run: |
          if git tag --points-at HEAD | grep -q '^v'; then
            echo "already_tagged=true" >> "$GITHUB_OUTPUT"
          else
            echo "already_tagged=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Sync main, bump version, commit, push
        if: steps.check_tag.outputs.already_tagged == 'false'
        id: bump
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          release_commit_push() {
            git fetch origin main --tags
            git merge origin/main --no-edit
            LATEST_TAG="$(git tag --list 'v*' --sort=-v:refname | head -n 1)"
            CURRENT_VERSION="$(node -p "require('./package.json').version")"
            if [ -z "$LATEST_TAG" ]; then
              # First release: ship workspace's current version (avoids
              # surprising bumps on the very first run).
              if [ "$CURRENT_VERSION" = "0.0.0" ]; then
                NEW_VERSION="0.1.0"
              else
                NEW_VERSION="${CURRENT_VERSION}"
              fi
            else
              VERSION="${LATEST_TAG#v}"
              IFS='.' read -r MAJOR MINOR PATCH <<< "$VERSION"
              NEW_PATCH=$((PATCH + 1))
              NEW_VERSION="${MAJOR}.${MINOR}.${NEW_PATCH}"
            fi
            echo "Releasing ${NEW_VERSION} (current workspace=${CURRENT_VERSION}, latest tag=${LATEST_TAG:-<none>})"
            node scripts/bump-version.mjs "${NEW_VERSION}"
            git add package.json packages/*/package.json
            if git diff --cached --quiet; then
              echo "No version bump needed (workspace already at ${NEW_VERSION})"
            else
              git commit -m "chore: bump to ${NEW_VERSION} [skip ci]"
              git push origin HEAD:main
            fi
            echo "new_version=${NEW_VERSION}" >> "$GITHUB_OUTPUT"
            echo "new_tag=v${NEW_VERSION}" >> "$GITHUB_OUTPUT"
          }

          if ! release_commit_push; then
            git fetch origin main --tags
            git reset --hard origin/main
            release_commit_push || exit 1
          fi

      - name: Tag and push
        if: steps.check_tag.outputs.already_tagged == 'false'
        run: |
          git tag "${{ steps.bump.outputs.new_tag }}"
          git push origin "${{ steps.bump.outputs.new_tag }}"

      - name: Refresh lockfile after bump
        if: steps.check_tag.outputs.already_tagged == 'false'
        run: pnpm install --no-frozen-lockfile

      - name: Build workspace
        if: steps.check_tag.outputs.already_tagged == 'false'
        run: pnpm build

      - name: Build release bundle (mailai-agent)
        if: steps.check_tag.outputs.already_tagged == 'false'
        run: |
          set -euo pipefail
          VERSION="${{ steps.bump.outputs.new_version }}"
          DEPLOY_DIR="${RUNNER_TEMP}/mailai-agent"
          rm -rf "${DEPLOY_DIR}"
          pnpm --filter @mailai/agent --prod deploy "${DEPLOY_DIR}"
          test -f "${DEPLOY_DIR}/dist/cli.js" || (echo "missing dist/cli.js" && exit 1)
          tar czf "mailai-agent-${VERSION}.tgz" -C "${RUNNER_TEMP}" mailai-agent
          ls -lh "mailai-agent-${VERSION}.tgz"

      - name: Build release bundle (mailai-react-app)
        if: steps.check_tag.outputs.already_tagged == 'false'
        run: |
          set -euo pipefail
          VERSION="${{ steps.bump.outputs.new_version }}"
          DEPLOY_DIR="${RUNNER_TEMP}/mailai-react-app"
          rm -rf "${DEPLOY_DIR}"
          pnpm --filter @mailai/react-app --prod deploy "${DEPLOY_DIR}"
          # Sanity check that subpath entry points consumers will import exist
          test -f "${DEPLOY_DIR}/dist/index.js" || (echo "missing dist/index.js" && exit 1)
          tar czf "mailai-react-app-${VERSION}.tgz" -C "${RUNNER_TEMP}" mailai-react-app
          ls -lh "mailai-react-app-${VERSION}.tgz"

      - name: Compute server image ref
        if: steps.check_tag.outputs.already_tagged == 'false'
        id: image_ref
        env:
          NEW_VERSION: ${{ steps.bump.outputs.new_version }}
        run: |
          OWNER_LC="$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')"
          echo "image_ref=ghcr.io/${OWNER_LC}/mail-ai-server:${NEW_VERSION}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        if: steps.check_tag.outputs.already_tagged == 'false'
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        if: steps.check_tag.outputs.already_tagged == 'false'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push @mailai/server image
        if: steps.check_tag.outputs.already_tagged == 'false'
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./infra/docker/Dockerfile.server
          push: true
          tags: ${{ steps.image_ref.outputs.image_ref }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Publish GitHub Release
        if: steps.check_tag.outputs.already_tagged == 'false'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          VERSION="${{ steps.bump.outputs.new_version }}"
          gh release create "v${VERSION}" \
            "mailai-agent-${VERSION}.tgz" \
            "mailai-react-app-${VERSION}.tgz" \
            --title "v${VERSION}" \
            --generate-notes

  notify-hof-os:
    name: Notify hof-os of new release
    needs: release
    runs-on: ubuntu-latest
    timeout-minutes: 5
    # Mirrors office-ai's notify-hof-os gate: runs whenever a new
    # version was cut. The token check happens implicitly when the
    # checkout step runs against jhoetter/hof-os.
    if: needs.release.outputs.new_version != ''
    steps:
      - name: Checkout hof-os
        uses: actions/checkout@v4
        with:
          repository: jhoetter/hof-os
          token: ${{ secrets.MAILAI_SYNC_TOKEN }}
          ref: main

      - name: Update mailai lockfile
        env:
          NEW_VERSION: ${{ needs.release.outputs.new_version }}
          IMAGE_REF: ${{ needs.release.outputs.image_ref }}
          GIT_SHA: ${{ github.sha }}
        run: |
          set -euo pipefail
          mkdir -p infra
          PUBLISHED_AT="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          AGENT_TARBALL="https://github.com/jhoetter/mail-ai/releases/download/v${NEW_VERSION}/mailai-agent-${NEW_VERSION}.tgz"
          REACT_TARBALL="https://github.com/jhoetter/mail-ai/releases/download/v${NEW_VERSION}/mailai-react-app-${NEW_VERSION}.tgz"
          cat > infra/mailai.lock.json <<EOF
          {
            "version": "${NEW_VERSION}",
            "app_image": "${IMAGE_REF}",
            "agent_version": "${NEW_VERSION}",
            "agent_tarball": "${AGENT_TARBALL}",
            "react_app_version": "${NEW_VERSION}",
            "react_app_tarball": "${REACT_TARBALL}",
            "published_at": "${PUBLISHED_AT}",
            "source_repo": "jhoetter/mail-ai",
            "source_sha": "${GIT_SHA}"
          }
          EOF
          cat infra/mailai.lock.json

      - name: Commit and push
        env:
          NEW_VERSION: ${{ needs.release.outputs.new_version }}
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add infra/mailai.lock.json
          if git diff --cached --quiet; then
            echo "mailai.lock.json already at ${NEW_VERSION}; nothing to commit"
            exit 0
          fi
          git commit -m "chore(mailai): bump to ${NEW_VERSION}"
          git pull --rebase origin main
          git push origin main
